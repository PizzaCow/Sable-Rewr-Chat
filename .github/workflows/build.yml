name: Build APK

on:
  push:
    branches: [ main, fixes/security-and-stability ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/rewr-release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: rewr-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk rewr-chat.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## v1.18 — Fix duplicate, delayed & missing notifications
            - 🔔 Fixed duplicate notifications — FCM and SyncService were both showing a notification for the same message; added event_id deduplication so whichever path fires first wins and the other skips
            - 🔔 Fixed delayed notifications — SyncService long-poll is now a true fallback only (FCM is primary); dedup prevents the fallback from clobbering the fast FCM notification
            - 🔔 Fixed missing notifications in some cases — notification stacking no longer double-appends messages to MessagingStyle
          prerelease: false
          files: rewr-chat.apk
