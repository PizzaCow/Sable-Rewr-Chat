name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk sable-android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## What's new in ${{ steps.version.outputs.name }}

            - 🔔 **Instant notifications** — persistent background sync keeps you connected even when the app is closed
            - 💬 **DM notifications** — encrypted DMs now correctly trigger notifications ("New message" to preserve privacy)
            - 🔐 **SSO login fixed** — authentication flow now stays inside the app instead of opening the browser
            - 💾 **Stay logged in** — sessions now persist across app restarts
            - 🖼️ **Sable icon** — proper launcher icon across all screen densities
          prerelease: false
          files: sable-android.apk
