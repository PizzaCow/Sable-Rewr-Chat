name: Build APK

on:
  push:
    branches: [ main, fixes/security-and-stability ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/rewr-release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: rewr-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk rewr-chat.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## v1.17 — Material You, Splash Screen & Conversation Bubbles
            - 🎨 Material You dynamic colors (Android 12+ wallpaper-derived accents)
            - ⚡ Splash screen — app icon on black, stays until WebView loads (no white flash)
            - 💬 Conversation bubbles — floating chat heads from notifications (Android 11+)
            - 🔒 Encrypted token storage (EncryptedSharedPreferences)
            - 🔒 Removed google-services.json from repo (CI secret injection)
            - 🔒 Origin validation on JS bridge
            - 🔧 Fixed WebRTC permission race condition
            - 🔧 R8/ProGuard enabled
            - 🔧 Centralized Config class
          prerelease: false
          files: rewr-chat.apk
