name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk sable-android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.01
          name: v1.01
          body: "Sable Android v1.01"
          prerelease: false
          files: sable-android.apk
