name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build FOSS (UnifiedPush) debug APK
        run: ./gradlew assembleFossDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/foss/debug/app-foss-debug.apk rewr-chat.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Google-free build — no Firebase, no Play Services.
            Requires a UnifiedPush distributor (e.g. ntfy) for push notifications.

            Changes in v1.081:
            - Fix: group chat notifications now show the room name and room avatar instead of the sender's name and avatar

            Changes in v1.08:
            - Separate notification channels: Direct Messages (high priority) and Group Rooms
            - Quick reply and Mark as read directly from the notification shade
            - App icon badge count (clears on open)
            - Deep links: to.rewr.chat opens in-app, SSO login completes in-app, matrix: URI support
            - FOSS / Google-free push via UnifiedPush
          prerelease: false
          files: rewr-chat.apk
