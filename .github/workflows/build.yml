name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build FOSS debug APK
        run: ./gradlew assembleFossDebug

      - name: Build Full (FCM) debug APK
        run: ./gradlew assembleFullDebug

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/foss/debug/app-foss-debug.apk rewr-chat-foss.apk
          cp app/build/outputs/apk/full/debug/app-full-debug.apk rewr-chat-full.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Two builds available:
            - **rewr-chat-foss.apk** — Google-free, no Firebase, no Play Services. Built-in ntfy push (no setup required).
            - **rewr-chat-full.apk** — FCM push via Firebase (requires Google Play Services).

            Changes in v1.081:
            - Fix: group chat notifications now show the room name and room avatar instead of the sender's name and avatar

            Changes in v1.08:
            - Separate notification channels: Direct Messages (high priority) and Group Rooms
            - Quick reply and Mark as read directly from the notification shade
            - App icon badge count (clears on open)
            - Deep links: to.rewr.chat opens in-app, SSO login completes in-app, matrix: URI support
            - FOSS: built-in ntfy push (no external app required)
          prerelease: false
          files: |
            rewr-chat-foss.apk
            rewr-chat-full.apk
