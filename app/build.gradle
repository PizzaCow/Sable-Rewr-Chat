plugins {
    id 'com.android.application'
    // google-services plugin applied only for the full (FCM) flavor
    id 'com.google.gms.google-services' apply false
}

android {
    namespace 'ca.rewr.sable'
    compileSdk 34

    defaultConfig {
        applicationId "ca.rewr.sable"
        minSdk 26
        targetSdk 34
        versionCode 10
        versionName "1.081"
    }

    flavorDimensions "distribution"

    productFlavors {
        full {
            dimension "distribution"
            // FCM / Google Play flavor — apply google-services plugin
            apply plugin: 'com.google.gms.google-services'
        }
        foss {
            dimension "distribution"
            // Google-free / UnifiedPush flavor
            versionNameSuffix "-foss"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.10.0'
    implementation 'androidx.work:work-runtime:2.9.0'

    // Full flavor: Firebase / FCM
    fullImplementation platform('com.google.firebase:firebase-bom:33.1.0')
    fullImplementation 'com.google.firebase:firebase-messaging'

    // FOSS flavor: UnifiedPush (JitPack — com.github.UnifiedPush:android-connector)
    fossImplementation 'com.github.UnifiedPush:android-connector:3.0.10'
    // kotlin-stdlib needed to reference kotlin.Unit from Java in the UP callback
    fossImplementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
}
